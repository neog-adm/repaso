<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepASO</title>
<style>
:root {
  --bg: #f7f7f5;
  --surface: #ffffff;
  --border: #e2e2de;
  --text: #18181b;
  --muted: #71717a;
  --accent: #2563eb;
  --green: #16a34a;
  --red: #dc2626;
  --amber: #d97706;
  --r: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

#app {
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 20px;
}

h1 { font-size: 1.75rem; font-weight: 800; }
h2 { font-size: 1.2rem;  font-weight: 700; }
h3 { font-size: 1rem;    font-weight: 600; }
p  { line-height: 1.6; }

.muted { color: var(--muted); font-size: 0.875rem; }
.link  { color: var(--accent); cursor: pointer; }
.link:hover { text-decoration: underline; }

.row    { display: flex; align-items: center; }
.between{ justify-content: space-between; }
.wrap   { flex-wrap: wrap; }
.gap-8  { gap: 8px; }
.gap-12 { gap: 12px; }
.mt-4   { margin-top: 4px; }
.mt-8   { margin-top: 8px; }
.mt-16  { margin-top: 16px; }
.mt-24  { margin-top: 24px; }
.mb-16  { margin-bottom: 16px; }
.mb-24  { margin-bottom: 24px; }
.center { text-align: center; }
.hidden { display: none !important; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  border-radius: var(--r);
  border: 1px solid transparent;
  cursor: pointer;
  font-size: 0.875rem; font-weight: 500; font-family: inherit;
  transition: opacity .15s, background .15s;
  white-space: nowrap;
}
.btn:hover    { opacity: .85; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-sm       { padding: 5px 10px; font-size: .8rem; }
.btn-primary  { background: var(--accent); color: #fff; }
.btn-success  { background: var(--green);  color: #fff; }
.btn-ghost    { background: transparent; border-color: var(--border); color: var(--text); }
.btn-ghost:hover { background: var(--bg); opacity: 1; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 1px 2px rgba(0,0,0,.05);
}

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: .75rem; font-weight: 600;
}
.badge-green { background: #dcfce7; color: #15803d; }
.badge-amber { background: #fef3c7; color: #92400e; }

.parciales-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 14px;
}
@media (max-width: 480px) { .parciales-grid { grid-template-columns: 1fr; } }

.parcial-tile {
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px;
}
.parcial-tile.approved  { border-color: var(--green); background: #f0fdf4; }
.parcial-tile.exam-soon { border-color: var(--amber); background: #fffbeb; }

.big-num {
  font-size: 2.25rem; font-weight: 800;
  color: var(--accent);
  line-height: 1; margin: 6px 0 2px;
}

.progress-wrap {
  height: 6px; background: var(--border);
  border-radius: 3px; overflow: hidden; flex: 1;
}
.progress-fill {
  height: 100%; background: var(--accent);
  transition: width .3s;
}

.flip-area {
  perspective: 1000px;
  height: 280px; cursor: pointer;
  user-select: none; margin: 24px 0;
}
.flip-inner {
  position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform .45s;
}
.flip-inner.flipped { transform: rotateY(180deg); }

.flip-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px; text-align: center;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.flip-back { transform: rotateY(180deg); }

.q-text { font-size: 1.2rem; font-weight: 500; line-height: 1.55; white-space: pre-wrap; }
.a-text { font-size: 1.05rem; line-height: 1.6; white-space: pre-wrap; }
.flip-hint { font-size: .8rem; color: var(--muted); margin-top: 16px; }

.answer-btns {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.answer-btn {
  padding: 18px; border: none; border-radius: var(--r);
  font-size: 1rem; font-weight: 700;
  cursor: pointer; font-family: inherit;
  transition: opacity .15s;
}
.answer-btn:hover { opacity: .85; }
.answer-btn.mal  { background: var(--red);   color: #fff; }
.answer-btn.bien { background: var(--green); color: #fff; }

.stat-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; margin: 20px 0;
}
.stat-tile { text-align: center; background: var(--bg); border-radius: var(--r); padding: 16px; }
.stat-num  { font-size: 2rem; font-weight: 800; }
.stat-label{ font-size: .8rem; color: var(--muted); margin-top: 4px; }

.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-icon { font-size: 3rem; margin-bottom: 12px; }

.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 50; padding: 16px;
}
.modal-box {
  background: var(--surface); border-radius: var(--r);
  padding: 24px; width: 100%; max-width: 520px;
  max-height: 85vh; overflow-y: auto;
}

label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: 4px; }
input[type=text], input[type=date], input[type=password], select, textarea {
  width: 100%; padding: 8px 12px;
  border: 1px solid var(--border); border-radius: var(--r);
  font-size: .875rem; font-family: inherit;
  background: var(--surface); color: var(--text);
  margin-bottom: 14px;
}
textarea { resize: vertical; min-height: 110px; }
input:focus, select:focus, textarea:focus {
  outline: 2px solid var(--accent); outline-offset: -1px;
}

hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
[data-action] { cursor: pointer; }

code {
  font-family: ui-monospace, SFMono-Regular, monospace;
  font-size: .85em; background: var(--bg);
  padding: 1px 5px; border-radius: 4px;
}

/* Sync badge */
@keyframes spin { to { transform: rotate(360deg); } }
.spin { display: inline-block; animation: spin .8s linear infinite; }

.sync-badge {
  font-size: .75rem; font-weight: 500;
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 999px;
  transition: color .2s;
}
.sync-queued  { color: var(--accent); }
.sync-syncing { color: var(--accent); }
.sync-ok      { color: var(--green); }
.sync-error   { color: var(--red); text-decoration: underline; }

/* Loading & Setup */
.loading-full {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 60vh; gap: 16px; color: var(--muted);
}
.loading-spinner { font-size: 2.5rem; animation: spin .8s linear infinite; display: inline-block; }

.setup-wrap { max-width: 460px; margin: 60px auto 0; }
.setup-wrap h1 { margin-bottom: 6px; }

.offline-banner {
  background: #fffbeb; border: 1px solid var(--amber);
  border-radius: var(--r); padding: 12px 16px;
  margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>

<script>
// ─── UTILS ───────────────────────────────────────────────────────────────────

function uid() { return '_' + Math.random().toString(36).slice(2, 10); }
function today() { return new Date().toISOString().split('T')[0]; }
function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}
function fmtDate(s) {
  if (!s) return '—';
  const [y, m, d] = s.split('-');
  return `${d}/${m}/${y}`;
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ─── CONFIG ──────────────────────────────────────────────────────────────────

const CONFIG = (() => {
  const KEY = 'repaso_config';
  return {
    get()    { try { return JSON.parse(localStorage.getItem(KEY)); } catch { return null; } },
    set(cfg) { localStorage.setItem(KEY, JSON.stringify(cfg)); },
    clear()  { localStorage.removeItem(KEY); }
  };
})();

// ─── GIST API ────────────────────────────────────────────────────────────────

const GIST = (() => {
  const FILE = 'repaso_v1.json';

  function hdrs(token) {
    return {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    };
  }

  return {
    async read(token, gistId) {
      const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers: hdrs(token) });
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      const json = await res.json();
      const content = json.files[FILE]?.content;
      if (!content) return { materias: [], cards: [] };
      return JSON.parse(content);
    },

    async write(token, gistId, state) {
      const res = await fetch(`https://api.github.com/gists/${gistId}`, {
        method: 'PATCH',
        headers: hdrs(token),
        body: JSON.stringify({ files: { [FILE]: { content: JSON.stringify(state) } } })
      });
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
    },

    async create(token) {
      const res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: hdrs(token),
        body: JSON.stringify({
          description: 'RepASO — flashcards universitarias',
          public: false,
          files: { [FILE]: { content: JSON.stringify({ materias: [], cards: [] }) } }
        })
      });
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      return (await res.json()).id;
    }
  };
})();

// ─── DB ──────────────────────────────────────────────────────────────────────

const DB = (() => {
  const CACHE_KEY = 'repaso_v1';
  let data = null;
  let _syncFn = () => {};

  function get() {
    if (!data) {
      try { data = JSON.parse(localStorage.getItem(CACHE_KEY)) || { materias: [], cards: [] }; }
      catch { data = { materias: [], cards: [] }; }
    }
    return data;
  }

  function flush() {
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    _syncFn();
  }

  return {
    setSyncFn(fn)     { _syncFn = fn; },
    loadFromRemote(d) { data = d; localStorage.setItem(CACHE_KEY, JSON.stringify(d)); },
    getMaterias: ()   => get().materias,
    getCards:    ()   => get().cards,

    addMateria(nombre) {
      const m = {
        id: uid(), nombre,
        parciales: [
          { numero: 1, estado: 'activo', fecha_examen: null, fecha_aprobacion: null },
          { numero: 2, estado: 'activo', fecha_examen: null, fecha_aprobacion: null }
        ]
      };
      get().materias.push(m); flush(); return m;
    },

    updateParcial(matId, num, patch) {
      const p = get().materias.find(m => m.id === matId)?.parciales.find(p => p.numero === num);
      if (p) { Object.assign(p, patch); flush(); }
    },

    approveParcial(matId, num) {
      const mat = get().materias.find(m => m.id === matId);
      const p   = mat?.parciales.find(p => p.numero === num);
      if (!p) return;
      p.estado = 'aprobado'; p.fecha_aprobacion = today();
      get().cards.forEach(c => { if (c.materia_id === matId && c.parcial === num) c.activa = false; });
      flush();
    },

    addCards(cards) { get().cards.push(...cards); flush(); },

    updateCard(id, patch) {
      const c = get().cards.find(c => c.id === id);
      if (c) { Object.assign(c, patch); flush(); }
    },

    exportJson() { return JSON.stringify(get(), null, 2); },

    importJson(raw) {
      const parsed = JSON.parse(raw);
      if (!parsed.materias || !parsed.cards) throw new Error('Formato inválido');
      data = parsed; flush();
    }
  };
})();

// ─── SYNC ────────────────────────────────────────────────────────────────────

const SYNC = (() => {
  let timer = null;
  let _status = 'idle';

  function updateBadge() {
    const el = document.getElementById('sync-badge');
    if (!el) return;
    const map = {
      idle:    { cls: '',              html: '' },
      queued:  { cls: 'sync-queued',  html: '● Pendiente' },
      syncing: { cls: 'sync-syncing', html: '<span class="spin">⟳</span> Sincronizando…' },
      ok:      { cls: 'sync-ok',      html: '✓ Sincronizado' },
      error:   { cls: 'sync-error',   html: '⚠ Error — reintentar' },
    };
    const s = map[_status] || map.idle;
    el.className = `sync-badge ${s.cls}`;
    el.innerHTML = s.html;
    _status === 'error'
      ? el.setAttribute('data-action', 'retry-sync')
      : el.removeAttribute('data-action');
  }

  async function doSync() {
    const cfg = CONFIG.get();
    if (!cfg) return;
    _status = 'syncing'; updateBadge();
    try {
      await GIST.write(cfg.token, cfg.gist_id, JSON.parse(DB.exportJson()));
      _status = 'ok';
    } catch {
      _status = 'error';
    }
    updateBadge();
  }

  return {
    queue() {
      if (!CONFIG.get()) return;
      _status = 'queued'; updateBadge();
      clearTimeout(timer);
      timer = setTimeout(doSync, 800);
    },
    retry()       { clearTimeout(timer); doSync(); },
    updateBadge() { updateBadge(); }
  };
})();

DB.setSyncFn(() => SYNC.queue());

// ─── SRS ─────────────────────────────────────────────────────────────────────

const SRS = {
  nextSrs(srs, resultado) {
    const next = { ...srs, ultimo_repaso: today() };
    if (resultado === 'mal') {
      next.racha = 0; next.intervalo = 1;
    } else {
      next.racha += 1;
      next.intervalo = next.racha === 1 ? 3
                     : next.racha === 2 ? 7
                     : Math.round(next.intervalo * 2.5);
    }
    next.proximo_repaso = addDays(today(), next.intervalo);
    return next;
  },

  isExamMode(materia, parcialNum) {
    const p = materia.parciales.find(p => p.numero === parcialNum);
    if (!p?.fecha_examen) return false;
    const vispera = addDays(p.fecha_examen, -1);
    const t = today();
    return t >= vispera && t <= p.fecha_examen;
  },

  isDue(card, materia) {
    if (!card.activa) return false;
    if (this.isExamMode(materia, card.parcial)) return true;
    return card.srs.proximo_repaso <= today();
  },

  getDue(matId, parcialNum) {
    const mat = DB.getMaterias().find(m => m.id === matId);
    if (!mat) return [];
    return DB.getCards().filter(c =>
      c.materia_id === matId && c.parcial === parcialNum && this.isDue(c, mat)
    );
  }
};

// ─── CSV PARSER ──────────────────────────────────────────────────────────────

function parseCsvLine(line) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) { res.push(cur); cur = ''; }
    else { cur += ch; }
  }
  res.push(cur);
  return res.map(s => s.trim());
}

function parseNotebookCsv(text) {
  const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
  let start = 0;
  const first = (lines[0] || '').toLowerCase();
  if (first.includes('front') || first.includes('back') || first.includes('pregunta') || first.includes('question')) start = 1;
  const cards = [];
  for (let i = start; i < lines.length; i++) {
    const parts = parseCsvLine(lines[i]);
    if (parts.length >= 2 && parts[0] && parts[1]) cards.push({ pregunta: parts[0], respuesta: parts[1] });
  }
  return cards;
}

// ─── STATE ───────────────────────────────────────────────────────────────────

const S = {
  view: 'loading',
  modal: null,
  session: null,
  offlineMode: false
};

// ─── RENDER ──────────────────────────────────────────────────────────────────

function render() {
  document.getElementById('app').innerHTML =
    S.view === 'loading'  ? renderLoading()  :
    S.view === 'setup'    ? renderSetup()    :
    S.view === 'review'   ? renderReview()   :
    S.view === 'summary'  ? renderSummary()  :
                            renderDashboard();
  document.getElementById('modal-root').innerHTML = S.modal ? renderModal() : '';
  if (S.view === 'dashboard') SYNC.updateBadge();
}

// Loading ─────────────────────────────────────────────────────────────────────

function renderLoading() {
  return `
    <div class="loading-full">
      <div class="loading-spinner">⟳</div>
      <p class="muted">Cargando datos desde GitHub…</p>
    </div>`;
}

// Setup ───────────────────────────────────────────────────────────────────────

function renderSetup() {
  return `
    <div class="setup-wrap">
      <h1>RepASO</h1>
      <p class="muted mt-4 mb-24">Conectá con GitHub para sincronizar tus cards entre todos tus dispositivos.</p>

      <div class="card">
        <h3 class="mb-16">Configurar sincronización</h3>

        <label>Token de GitHub (PAT) <span style="color:var(--red)">*</span></label>
        <input type="password" id="cfg-token" placeholder="ghp_..." autocomplete="off">
        <p class="muted mt-4 mb-16" style="font-size:.8rem">
          Necesitás un token con scope <strong>gist</strong>.
          <a href="https://github.com/settings/tokens/new?scopes=gist&description=RepASO" target="_blank" rel="noopener" class="link">Crear token en GitHub →</a>
        </p>

        <label>ID del Gist (opcional)</label>
        <input type="text" id="cfg-gist" placeholder="Dejar vacío para crear uno nuevo automáticamente">
        <p class="muted mt-4 mb-16" style="font-size:.8rem">
          Si ya usás RepASO en otro dispositivo, pegá el ID del Gist para sincronizar los datos existentes.
        </p>

        <p id="cfg-error" class="mb-16" style="color:var(--red);font-size:.875rem;display:none"></p>

        <div style="display:flex;justify-content:flex-end">
          <button class="btn btn-primary" data-action="confirm-setup" id="cfg-btn">Conectar →</button>
        </div>
      </div>

      <p class="muted center mt-16" style="font-size:.75rem">
        El token se guarda únicamente en este dispositivo. Los datos se almacenan en un Gist privado de tu cuenta de GitHub.
      </p>
    </div>`;
}

// Dashboard ───────────────────────────────────────────────────────────────────

function renderDashboard() {
  const mats = DB.getMaterias();

  const offlineBanner = S.offlineMode ? `
    <div class="offline-banner">
      <p style="color:var(--amber);font-size:.875rem">⚠ Sin conexión a GitHub — trabajando con datos locales.</p>
      <button class="btn btn-ghost btn-sm" data-action="retry-connect">Reconectar</button>
    </div>` : '';

  if (!mats.length) return `
    ${offlineBanner}
    <div class="empty">
      <div class="empty-icon">📚</div>
      <h2 style="color:var(--text);margin-bottom:8px">No hay materias todavía</h2>
      <p class="muted mb-16">Agregá tu primera materia para empezar</p>
      <button class="btn btn-primary" data-action="add-mat">+ Agregar materia</button>
    </div>`;

  let totalDue = 0;

  const matHtml = mats.map(mat => {
    const tilesHtml = mat.parciales.map(p => {
      const due     = SRS.getDue(mat.id, p.numero);
      const activas = DB.getCards().filter(c => c.materia_id === mat.id && c.parcial === p.numero && c.activa);
      const examMode = SRS.isExamMode(mat, p.numero);
      const ok      = p.estado === 'aprobado';
      totalDue += due.length;

      if (ok) return `
        <div class="parcial-tile approved">
          <div class="row between gap-8">
            <h3>Parcial ${p.numero}</h3>
            <span class="badge badge-green">Aprobado ✓</span>
          </div>
          <p class="muted mt-4">El ${fmtDate(p.fecha_aprobacion)}</p>
        </div>`;

      return `
        <div class="parcial-tile ${examMode ? 'exam-soon' : ''}">
          <div class="row between gap-8">
            <h3>Parcial ${p.numero}</h3>
            ${examMode ? '<span class="badge badge-amber">¡Examen!</span>' : ''}
          </div>
          <div class="big-num">${due.length}</div>
          <p class="muted">${due.length === 1 ? 'card hoy' : 'cards hoy'} · ${activas.length} activas</p>
          <p class="muted mt-4">
            ${p.fecha_examen
              ? `📅 ${fmtDate(p.fecha_examen)} — <span class="link" data-action="set-exam" data-mat="${mat.id}" data-p="${p.numero}">cambiar</span>`
              : `<span class="link" data-action="set-exam" data-mat="${mat.id}" data-p="${p.numero}">+ Fijar fecha de examen</span>`
            }
          </p>
          <div class="row gap-8 wrap mt-16">
            ${due.length ? `<button class="btn btn-primary btn-sm" data-action="start" data-mat="${mat.id}" data-p="${p.numero}">Repasar →</button>` : ''}
            <button class="btn btn-ghost btn-sm" data-action="approve" data-mat="${mat.id}" data-p="${p.numero}">Aprobé ✓</button>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="card">
        <div class="row between gap-8">
          <h2>${esc(mat.nombre)}</h2>
          <button class="btn btn-ghost btn-sm" data-action="import" data-mat="${mat.id}">+ Importar cards</button>
        </div>
        <div class="parciales-grid">${tilesHtml}</div>
      </div>`;
  }).join('');

  return `
    ${offlineBanner}
    <div class="row between gap-8 mb-24" style="flex-wrap:wrap;row-gap:12px">
      <div>
        <h1>RepASO</h1>
        <p class="muted mt-4">${totalDue ? `${totalDue} cards para hoy` : 'Todo al día 🎉'}</p>
      </div>
      <div class="row gap-8 wrap" style="align-items:center">
        ${!S.offlineMode ? '<span id="sync-badge" class="sync-badge"></span>' : ''}
        <button class="btn btn-ghost btn-sm" data-action="open-backup">⬇ Backup</button>
        <button class="btn btn-ghost btn-sm" data-action="open-settings" title="Sincronización">⚙</button>
        <button class="btn btn-primary" data-action="add-mat">+ Materia</button>
      </div>
    </div>
    ${matHtml}`;
}

// Review ──────────────────────────────────────────────────────────────────────

function renderReview() {
  const s = S.session;
  const card = s.cards[s.idx];
  const pct  = (s.idx / s.cards.length) * 100;

  return `
    <div class="row gap-12 mb-24">
      <button class="btn btn-ghost btn-sm" data-action="exit-review">← Salir</button>
      <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="muted">${s.idx + 1}/${s.cards.length}</span>
    </div>

    <p class="muted center mb-16">M${card.modulo} · Parcial ${card.parcial} · ${esc(s.matNombre)}</p>

    <div class="flip-area" data-action="flip">
      <div class="flip-inner ${s.flipped ? 'flipped' : ''}">
        <div class="flip-face">
          <p class="q-text">${esc(card.pregunta)}</p>
          <p class="flip-hint">Clic para ver la respuesta</p>
        </div>
        <div class="flip-face flip-back">
          <p class="a-text">${esc(card.respuesta)}</p>
        </div>
      </div>
    </div>

    <div class="answer-btns ${s.flipped ? '' : 'hidden'}">
      <button class="answer-btn mal"  data-action="ans" data-r="mal">✕ No lo sabía</button>
      <button class="answer-btn bien" data-action="ans" data-r="bien">✓ Lo sabía</button>
    </div>

    ${!s.flipped ? '<p class="muted center mt-16" style="font-size:.8rem">Intentá responder antes de girar la tarjeta</p>' : ''}`;
}

// Summary ─────────────────────────────────────────────────────────────────────

function renderSummary() {
  const s   = S.session;
  const tot = s.cards.length;
  const pct = Math.round((s.bien / tot) * 100);
  const msg = pct >= 80 ? '¡Muy bien! Seguí así 🔥'
            : pct >= 50 ? 'Bien — hay margen para mejorar'
                        : 'Estas cards vuelven mañana 💪';

  return `
    <div class="center mb-24">
      <h2>Sesión completada</h2>
      <p class="muted mt-4">${esc(s.matNombre)} · Parcial ${s.parcialNum}</p>
    </div>
    <div class="stat-grid">
      <div class="stat-tile">
        <div class="stat-num" style="color:var(--green)">${s.bien}</div>
        <div class="stat-label">Lo sabía</div>
      </div>
      <div class="stat-tile">
        <div class="stat-num" style="color:var(--red)">${s.mal}</div>
        <div class="stat-label">No lo sabía</div>
      </div>
      <div class="stat-tile">
        <div class="stat-num">${pct}%</div>
        <div class="stat-label">Aciertos</div>
      </div>
    </div>
    <p class="muted center mb-24">${msg}</p>
    <div style="display:flex;justify-content:center">
      <button class="btn btn-primary" data-action="go-home">Volver al inicio</button>
    </div>`;
}

// Modals ──────────────────────────────────────────────────────────────────────

function renderModal() {
  const { type, d } = S.modal;
  let inner = '';

  if (type === 'add-mat') inner = `
    <h3 class="mb-16">Nueva materia</h3>
    <label>Nombre</label>
    <input type="text" id="mat-name" placeholder="Ej: Derecho Privado" autofocus>
    <div class="row gap-8" style="justify-content:flex-end">
      <button class="btn btn-ghost" data-action="close-modal">Cancelar</button>
      <button class="btn btn-primary" data-action="confirm-add-mat">Agregar</button>
    </div>`;

  if (type === 'import') inner = `
    <h3 class="mb-16">Importar cards — ${esc(d.matNombre)}</h3>
    <label>Módulo</label>
    <select id="imp-mod">
      <option value="1">Módulo 1 → Parcial 1</option>
      <option value="2">Módulo 2 → Parcial 1</option>
      <option value="3">Módulo 3 → Parcial 2</option>
      <option value="4">Módulo 4 → Parcial 2</option>
    </select>
    <label>CSV de NotebookLM (pegalo acá)</label>
    <textarea id="imp-csv" placeholder='Front,Back&#10;"¿Qué es X?","Es la definición de X..."'></textarea>
    <p id="imp-preview" class="muted mb-16"></p>
    <div class="row gap-8" style="justify-content:flex-end">
      <button class="btn btn-ghost" data-action="close-modal">Cancelar</button>
      <button class="btn btn-primary" data-action="confirm-import">Importar</button>
    </div>`;

  if (type === 'set-exam') inner = `
    <h3 class="mb-16">Fecha de examen — Parcial ${d.pNum}</h3>
    <label>Fecha del parcial</label>
    <input type="date" id="exam-date" value="${d.fecha || ''}">
    <p class="muted mb-16" style="font-size:.8rem">
      📌 El día anterior al examen, todas las cards de este parcial aparecerán automáticamente para repasar.
    </p>
    <div class="row gap-8" style="justify-content:flex-end">
      <button class="btn btn-ghost" data-action="close-modal">Cancelar</button>
      <button class="btn btn-primary" data-action="confirm-set-exam">Guardar</button>
    </div>`;

  if (type === 'approve') inner = `
    <h3 class="mb-16">Aprobar Parcial ${d.pNum}</h3>
    <p style="margin-bottom:20px">
      ¿Confirmás que aprobaste el Parcial ${d.pNum} de <strong>${esc(d.matNombre)}</strong>?
      Todas las cards se archivarán y dejarán de aparecer en los repasos.
    </p>
    <div class="row gap-8" style="justify-content:flex-end">
      <button class="btn btn-ghost" data-action="close-modal">Cancelar</button>
      <button class="btn btn-success" data-action="confirm-approve">Sí, aprobé ✓</button>
    </div>`;

  if (type === 'backup') inner = `
    <h3 class="mb-16">Backup de datos</h3>
    <p class="muted mb-16">Descargá una copia local de tus datos o importá un backup previo.</p>
    <button class="btn btn-ghost mb-16" data-action="download-backup">⬇ Descargar JSON</button>
    <hr>
    <label>Importar backup</label>
    <textarea id="bk-import" placeholder='{"materias":[...],"cards":[...]}'></textarea>
    <div class="row gap-8" style="justify-content:flex-end">
      <button class="btn btn-ghost" data-action="close-modal">Cerrar</button>
      <button class="btn btn-primary" data-action="confirm-import-bk">Importar backup</button>
    </div>`;

  if (type === 'settings') {
    const cfg = CONFIG.get() || {};
    inner = `
    <h3 class="mb-16">Sincronización con GitHub</h3>
    <label style="margin-bottom:8px">ID del Gist</label>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <code style="flex:1;word-break:break-all;font-size:.8rem">${esc(cfg.gist_id || '—')}</code>
      <button class="btn btn-ghost btn-sm" data-action="copy-gist-id">Copiar</button>
    </div>
    <p class="muted mb-16" style="font-size:.8rem">
      Para conectar otro dispositivo usá el mismo token y pegá este ID en el campo correspondiente.
    </p>
    <hr>
    <p class="muted mb-16" style="font-size:.8rem">Para cambiar el token o el Gist, desconectá y volvé a conectar. Los datos locales se mantienen.</p>
    <div class="row gap-8" style="justify-content:flex-end">
      <button class="btn btn-ghost" data-action="close-modal">Cerrar</button>
      <button class="btn btn-ghost" style="border-color:var(--red);color:var(--red)" data-action="disconnect">Desconectar</button>
    </div>`;
  }

  return `
    <div class="overlay" data-action="close-modal">
      <div class="modal-box" data-action="noop">${inner}</div>
    </div>`;
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────

function answerCard(resultado) {
  const s    = S.session;
  const card = s.cards[s.idx];
  DB.updateCard(card.id, { srs: SRS.nextSrs(card.srs, resultado) });
  s[resultado === 'bien' ? 'bien' : 'mal']++;
  s.idx++; s.flipped = false;
  if (s.idx >= s.cards.length) S.view = 'summary';
  render();
}

async function handleSetup() {
  const token  = document.getElementById('cfg-token')?.value.trim();
  const gistId = document.getElementById('cfg-gist')?.value.trim();
  const errEl  = document.getElementById('cfg-error');
  const btn    = document.getElementById('cfg-btn');

  if (!token) {
    errEl.textContent = 'El token es requerido.';
    errEl.style.display = '';
    return;
  }

  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Conectando…';

  try {
    const id     = gistId || await GIST.create(token);
    const remote = await GIST.read(token, id);
    CONFIG.set({ token, gist_id: id });
    DB.loadFromRemote(remote);
    S.view = 'dashboard';
    render();
  } catch (e) {
    errEl.textContent = `Error al conectar: ${e.message}`;
    errEl.style.display = '';
    btn.disabled = false;
    btn.textContent = 'Conectar →';
  }
}

document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const { action, mat, p, r } = el.dataset;

  if (action === 'confirm-setup') { handleSetup(); return; }

  switch (action) {

    case 'add-mat':
      S.modal = { type: 'add-mat' }; render(); break;

    case 'confirm-add-mat': {
      const name = document.getElementById('mat-name')?.value.trim();
      if (name) { DB.addMateria(name); S.modal = null; render(); }
      break;
    }

    case 'import': {
      const mat2 = DB.getMaterias().find(m => m.id === mat);
      S.modal = { type: 'import', d: { matId: mat, matNombre: mat2.nombre } };
      render(); break;
    }

    case 'confirm-import': {
      const mod   = parseInt(document.getElementById('imp-mod').value);
      const txt   = document.getElementById('imp-csv').value;
      const items = parseNotebookCsv(txt);
      if (!items.length) { alert('No se detectaron cards. Revisá el formato del CSV.'); break; }
      DB.addCards(items.map(c => ({
        id: uid(), materia_id: S.modal.d.matId,
        modulo: mod, parcial: mod <= 2 ? 1 : 2,
        pregunta: c.pregunta, respuesta: c.respuesta, activa: true,
        srs: { ultimo_repaso: null, proximo_repaso: today(), intervalo: 1, racha: 0 }
      })));
      S.modal = null; render(); break;
    }

    case 'set-exam': {
      const mat2 = DB.getMaterias().find(m => m.id === mat);
      const p2   = mat2.parciales.find(x => x.numero === parseInt(p));
      S.modal = { type: 'set-exam', d: { matId: mat, pNum: parseInt(p), fecha: p2.fecha_examen || '' } };
      render(); break;
    }

    case 'confirm-set-exam': {
      const f = document.getElementById('exam-date').value;
      if (f) DB.updateParcial(S.modal.d.matId, S.modal.d.pNum, { fecha_examen: f });
      S.modal = null; render(); break;
    }

    case 'approve': {
      const mat2 = DB.getMaterias().find(m => m.id === mat);
      S.modal = { type: 'approve', d: { matId: mat, pNum: parseInt(p), matNombre: mat2.nombre } };
      render(); break;
    }

    case 'confirm-approve':
      DB.approveParcial(S.modal.d.matId, S.modal.d.pNum);
      S.modal = null; render(); break;

    case 'open-backup':
      S.modal = { type: 'backup' }; render(); break;

    case 'confirm-import-bk': {
      const raw = document.getElementById('bk-import')?.value.trim();
      if (!raw) break;
      try { DB.importJson(raw); S.modal = null; render(); }
      catch { alert('El JSON no es válido. Revisá el formato.'); }
      break;
    }

    case 'download-backup': {
      const blob = new Blob([DB.exportJson()], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), {
        href: url, download: `repaso_backup_${today()}.json`
      });
      a.click();
      URL.revokeObjectURL(url);
      break;
    }

    case 'open-settings':
      S.modal = { type: 'settings' }; render(); break;

    case 'copy-gist-id': {
      const cfg = CONFIG.get();
      if (cfg?.gist_id) {
        navigator.clipboard.writeText(cfg.gist_id).then(() => {
          const btn2 = document.querySelector('[data-action="copy-gist-id"]');
          if (btn2) { btn2.textContent = '✓ Copiado'; setTimeout(() => { btn2.textContent = 'Copiar'; }, 2000); }
        });
      }
      break;
    }

    case 'disconnect':
      CONFIG.clear();
      S.modal = null; S.offlineMode = false; S.view = 'setup';
      render(); break;

    case 'retry-sync':
      SYNC.retry(); break;

    case 'retry-connect':
      init(); break;

    case 'start': {
      const mat2 = DB.getMaterias().find(m => m.id === mat);
      const pNum = parseInt(p);
      const due  = SRS.getDue(mat, pNum);
      S.session  = {
        cards: shuffle(due), idx: 0, flipped: false,
        bien: 0, mal: 0,
        matId: mat, parcialNum: pNum, matNombre: mat2.nombre
      };
      S.view = 'review'; render(); break;
    }

    case 'flip':
      if (!S.session.flipped) { S.session.flipped = true; render(); } break;

    case 'ans':
      if (S.session?.flipped) answerCard(r); break;

    case 'exit-review':
    case 'go-home':
      S.view = 'dashboard'; S.session = null; S.modal = null; render(); break;

    case 'close-modal':
      S.modal = null; render(); break;
  }
});

document.addEventListener('input', e => {
  if (e.target.id === 'imp-csv') {
    const n  = parseNotebookCsv(e.target.value).length;
    const el = document.getElementById('imp-preview');
    if (el) el.textContent = n ? `${n} cards detectadas` : '';
  }
});

document.addEventListener('keydown', e => {
  if (S.view !== 'review' || !S.session) return;
  if (e.key === ' ' && !S.session.flipped) {
    e.preventDefault();
    S.session.flipped = true; render();
  } else if (S.session.flipped) {
    if (e.key === '1' || e.key === 'ArrowLeft')  answerCard('mal');
    if (e.key === '2' || e.key === 'ArrowRight') answerCard('bien');
  }
});

// ─── INIT ────────────────────────────────────────────────────────────────────

async function init() {
  S.offlineMode = false;
  const cfg = CONFIG.get();
  if (!cfg) { S.view = 'setup'; render(); return; }
  S.view = 'loading'; render();
  try {
    const remote = await GIST.read(cfg.token, cfg.gist_id);
    DB.loadFromRemote(remote);
    S.view = 'dashboard';
  } catch {
    S.offlineMode = true;
    S.view = 'dashboard';
  }
  render();
}

init();
</script>
</body>
</html>
